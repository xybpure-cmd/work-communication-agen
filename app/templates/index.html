<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作沟通辅助工具 V1.0</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>工作沟通辅助工具 V1.0</h1>
      <p class="subtitle">填写 4 个输入后，点击「生成回复」，即可得到 1 版回复草案（原型演示）。</p>
    </header>

    <form id="reply-form">
      <label>收到的消息（可空）
        <textarea name="incoming_message" rows="4" placeholder="可留空，例如：这周三前能不能给我一版项目进度说明？"></textarea>
      </label>

      <label>沟通背景
        <textarea name="communication_background" rows="4" required placeholder="例如：对方是跨部门合作人，本周需向总监汇报，当前数据还缺采购侧确认。"></textarea>
      </label>

      <label>参考材料
        <textarea name="reference_material" rows="4" required placeholder="例如：当前完成度 70%；风险点：供应商交付延迟 2 天；备选方案 B 可兜底。"></textarea>
      </label>

      <label>我的意图
        <textarea name="my_intent" rows="4" required placeholder="例如：争取延期到周五并说明风险，语气专业、克制、不推责。"></textarea>
      </label>

      <div class="actions">
        <button type="submit">生成回复</button>
      </div>
    </form>

    <section id="result">
      <div class="result-head">
        <h2>一版回复草案</h2>
        <button type="button" id="copy-btn" class="secondary">复制</button>
      </div>
      <textarea id="generated_reply" rows="12" readonly placeholder="点击“生成回复”后，将在此显示一版回复草案。"></textarea>
    </section>
  </main>

  <script>
    const form = document.getElementById('reply-form');
    const copyBtn = document.getElementById('copy-btn');
    const generatedReplyEl = document.getElementById('generated_reply');

    function buildMockReply(payload) {
      const incomingMessage = payload.incoming_message.trim();
      const background = payload.communication_background.trim();
      const reference = payload.reference_material.trim();
      const intent = payload.my_intent.trim();

      if (incomingMessage) {
        return [
          '您好，收到您的消息。',
          '',
          `结合当前情况：${background}。`,
          `目前可同步的信息是：${reference}。`,
          '',
          `基于以上信息，我这边建议按以下方向推进：${intent}。`,
          '如果您认可，我会按这个节奏继续执行，并及时同步最新进展。'
        ].join('\n');
      }

      return [
        '您好，我这边先主动同步一下当前进展。',
        '',
        `沟通背景：${background}。`,
        `目前关键信息：${reference}。`,
        '',
        `接下来我希望推进的方向是：${intent}。`,
        '如您有其他建议，我可以据此调整并尽快落实。'
      ].join('\n');
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const payload = {
        incoming_message: (data.get('incoming_message') || '').toString(),
        communication_background: (data.get('communication_background') || '').toString(),
        reference_material: (data.get('reference_material') || '').toString(),
        my_intent: (data.get('my_intent') || '').toString(),
      };

      generatedReplyEl.value = buildMockReply(payload);
    });

    copyBtn.addEventListener('click', async () => {
      if (!generatedReplyEl.value) return;
      try {
        await navigator.clipboard.writeText(generatedReplyEl.value);
        copyBtn.textContent = '已复制';
        setTimeout(() => { copyBtn.textContent = '复制'; }, 1200);
      } catch (_) {
        alert('复制失败，请手动复制。');
      }
    });
  </script>
</body>
</html>
