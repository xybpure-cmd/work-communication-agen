<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作沟通辅助网页工具 V1.0</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>工作沟通辅助网页工具 V1.0</h1>
      <p class="subtitle">单页轻量工具：基于 4 个输入字段，生成 1 版可编辑的回复草案。</p>
    </header>

    <form id="reply-form">
      <label>收到的消息（可空）
        <textarea name="incoming_message" rows="4" placeholder="可留空，例如：这周三前能不能给我一版项目进度说明？"></textarea>
      </label>

      <label>沟通背景
        <textarea name="communication_background" rows="4" required placeholder="例如：对方是跨部门合作人，本周需向总监汇报，当前数据还缺采购侧确认。"></textarea>
      </label>

      <label>参考材料
        <textarea name="reference_material" rows="4" required placeholder="例如：当前完成度 70%；风险点：供应商交付延迟 2 天；备选方案 B 可兜底。"></textarea>
      </label>

      <label>我的意图
        <textarea name="my_intent" rows="4" required placeholder="例如：争取延期到周五并说明风险，语气专业、克制、不推责。"></textarea>
      </label>

      <div class="actions">
        <button type="submit">生成</button>
        <button type="button" id="clear-btn" class="secondary">清空</button>
      </div>
    </form>

    <section id="result">
      <div class="result-head">
        <h2>一版回复草案</h2>
        <button type="button" id="copy-btn" class="secondary">复制</button>
      </div>
      <textarea id="draft_reply" rows="8" readonly placeholder="点击“生成”后，将在此显示一版回复草案。"></textarea>
    </section>
  </main>

  <script>
    const form = document.getElementById('reply-form');
    const clearBtn = document.getElementById('clear-btn');
    const copyBtn = document.getElementById('copy-btn');
    const draftReplyEl = document.getElementById('draft_reply');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const payload = {
        incoming_message: (data.get('incoming_message') || '').toString(),
        communication_background: (data.get('communication_background') || '').toString(),
        reference_material: (data.get('reference_material') || '').toString(),
        my_intent: (data.get('my_intent') || '').toString(),
      };

      const res = await fetch('/generate_reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        alert('生成失败，请检查输入内容、OpenAI Key 或服务日志。');
        return;
      }

      const output = await res.json();
      draftReplyEl.value = output.draft_reply || '';
    });

    clearBtn.addEventListener('click', () => {
      form.reset();
      draftReplyEl.value = '';
    });

    copyBtn.addEventListener('click', async () => {
      if (!draftReplyEl.value) return;
      try {
        await navigator.clipboard.writeText(draftReplyEl.value);
        copyBtn.textContent = '已复制';
        setTimeout(() => { copyBtn.textContent = '复制'; }, 1200);
      } catch (_) {
        alert('复制失败，请手动复制。');
      }
    });
  </script>
</body>
</html>
